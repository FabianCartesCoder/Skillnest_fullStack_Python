<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Usuario</title>
  <link rel="stylesheet" href="../static/css/styles.css">
  <style>
    body { align-items: center; min-height: 100vh; }
  </style>
</head>
<body>
  <div class="page-card">
    <div class="flex-between mb-1">
      <h1 style="margin-bottom:0;">Nuevo Usuario</h1>
      <a href="2_dashboard_admin.html" class="btn btn-ghost btn-sm">← Volver</a>
    </div>
    <p class="text-muted" style="margin-bottom:1.4rem; font-size:.82rem;">
      Al crear un nuevo usuario se puede elegir qué tipo de usuario crear.
    </p>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" placeholder="Nombre completo" />
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" placeholder="correo@ejemplo.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Conf. Contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Tipo de Usuario</label>
      <select>
        <option value="admin">Administrador</option>
        <option value="usuario" selected>Usuario</option>
      </select>
    </div>

    <div class="mt-3 text-right">
      <button class="btn btn-primary">Crear</button>
    </div>
  </div>
</body>
</html>
